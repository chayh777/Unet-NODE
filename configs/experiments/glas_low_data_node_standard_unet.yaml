seed: 42
paths:
  train_images_dir: data/glas/train/images
  train_masks_dir: data/glas/train/masks
  val_images_dir: data/glas/val/images
  val_masks_dir: data/glas/val/masks
  artifacts_dir: artifacts/glas_standard_unet
data:
  dataset_name: glas
  image_size: 256
  train_ratio: 1.0
  num_workers: 0
  pin_memory: false
model:
  architecture: standard_unet
  encoder_name: resnet34
  encoder_weights: imagenet
  in_channels: 3
  num_classes: 1
  bottleneck_channels: 256
  freeze_encoder: true
adapter:
  type: node
  hidden_channels: 256
node:
  solver: euler
  steps: 8
  step_size: 0.125
train:
  batch_size: 4
  epochs: 50
  learning_rate: 0.0003
  weight_decay: 0.0001
  early_stopping_patience: 8
  save_best_checkpoint: false
